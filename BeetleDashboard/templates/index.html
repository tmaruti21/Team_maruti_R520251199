<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Beetle Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f0f23);
color:#e0e0e0;
height:100vh;
overflow:hidden;
}

/* ===== LAYOUT ===== */

.container{
display:grid;
grid-template-columns:22% 56% 22%;
height:100vh;
}

/* ===== TELEMETRY ===== */

.telemetry{
padding:20px;
border-right:1px solid rgba(0,255,136,.2);
display:flex;
flex-direction:column;
gap:18px;
}

.panel{
background:#141428;
border:1px solid rgba(0,255,200,.3);
border-radius:8px;
padding:12px;
}

.panel-title{
font-size:12px;
color:#00c8ff;
margin-bottom:6px;
text-transform:uppercase;
}

.row{
display:flex;
justify-content:space-between;
font-family:monospace;
}

/* temperature */

.temp{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #ff6464;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
align-self:flex-end;
}

/* ===== CAMERA ===== */

.camera{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.camera-title{
color:#fbbf24;
margin-bottom:10px;
}

.camera-feed{
width:100%;
height:600px;
border:2px solid rgba(255,200,0,.4);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.camera-feed img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== RIGHT PANEL ===== */

.right-panel{
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

/* rover */

.rover-container{
position:relative;
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.rover-img{
width:120px;
}

.tof{
position:absolute;
width:70px;
height:45px;
background:#141428;
border:1px solid rgba(100,200,255,.4);
border-radius:6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:monospace;
color:#64c8ff;
}

.tof-top{top:0;left:50%;transform:translateX(-50%);}
.tof-left{left:0;top:50%;transform:translateY(-50%);}
.tof-right{right:0;top:50%;transform:translateY(-50%);}

/* map */

.map-circle{
width:320px;
height:320px;
border-radius:50%;
border:2px solid #00ff88;
background:#111827;
margin:auto;
position:relative;
}

canvas{
width:100%;
height:100%;
}

/* info */

.map-info{
display:flex;
flex-direction:column;
gap:10px;
}

.info{
display:flex;
justify-content:space-between;
border:1px solid rgba(0,255,136,.3);
padding:8px;
border-radius:6px;
}

.reset-btn{
background:#ff3366;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- TELEMETRY -->
<div class="telemetry">

<div class="temp">
<div id="tempDisplay">0°</div>
TEMP
</div>

<div class="panel">
<div class="panel-title">Linear Acceleration</div>
<div class="row"><span>AX</span><span id="ax">0</span></div>
<div class="row"><span>AY</span><span id="ay">0</span></div>
<div class="row"><span>AZ</span><span id="az">0</span></div>
</div>

<div class="panel">
<div class="panel-title">Gyroscope</div>
<div class="row"><span>GX</span><span id="gx">0</span></div>
<div class="row"><span>GY</span><span id="gy">0</span></div>
<div class="row"><span>GZ</span><span id="gz">0</span></div>
</div>

<div class="panel">
<div class="panel-title">Encoders</div>
<div class="row"><span>Left</span><span id="leftTicks">0</span></div>
<div class="row"><span>Right</span><span id="rightTicks">0</span></div>
</div>

</div>

<!-- CAMERA -->
<div class="camera">

<div class="camera-title">CAMERA FEED</div>

<div class="camera-feed">
<img src="http://10.135.56.66:8080/stream?topic=/camera/color/image_raw">
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right-panel">

<div class="rover-container">

<div class="tof tof-top">
FRONT
<div id="tof2">0</div>
</div>

<div class="tof tof-left">
LEFT
<div id="tof1">0</div>
</div>

<div class="tof tof-right">
RIGHT
<div id="tof3">0</div>
</div>

<img src="/static/rover.png" class="rover-img">

</div>

<div class="map-circle">
<canvas id="mapCanvas"></canvas>
</div>

<div class="map-info">

<div class="info">
<span>Yaw</span>
<span id="yawAngle">0</span>
</div>

<div class="info">
<span>Angular Vel</span>
<span id="gzDisplay">0</span>
</div>

<div class="info">
<span>Distance</span>
<span id="enc1Display">0</span>
</div>

<button class="reset-btn" onclick="resetPosition()">RESET MAPPING</button>

</div>

</div>

</div>

<script>

/* ============================
CANVAS SETUP
============================ */

const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 320;
canvas.height = 320;

const centerX = canvas.width/2;
const centerY = canvas.height/2;
const radius = 150;

let posX = centerX;
let posY = centerY;
let yaw = 0;

let pathHistory = [];
let lastEncoder = 0;

const ticksPerMeter = 1000;
const scale = 100;

/* ============================
RESET
============================ */

function resetPosition(){

posX = centerX;
posY = centerY;

yaw = 0;

pathHistory = [];
lastEncoder = 0;

fetch("/reset",{method:"POST"});

drawMap();

}

/* ============================
DRAW MAP
============================ */

function drawMap(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.arc(centerX,centerY,radius,0,Math.PI*2);
ctx.strokeStyle="#00ff88";
ctx.stroke();

/* draw path */

if(pathHistory.length>1){

ctx.beginPath();
ctx.moveTo(pathHistory[0].x,pathHistory[0].y);

for(let i=1;i<pathHistory.length;i++)
ctx.lineTo(pathHistory[i].x,pathHistory[i].y);

ctx.strokeStyle="#ff3366";
ctx.lineWidth=3;
ctx.stroke();

}

/* robot */

ctx.beginPath();
ctx.arc(posX,posY,6,0,Math.PI*2);
ctx.fillStyle="#ff3366";
ctx.fill();

/* heading */

ctx.save();

ctx.translate(posX,posY);
ctx.rotate(-yaw*Math.PI/180);

ctx.beginPath();
ctx.moveTo(20,0);
ctx.lineTo(-10,6);
ctx.lineTo(-10,-6);
ctx.closePath();

ctx.fillStyle="#fff";
ctx.fill();

ctx.restore();

}

/* ============================
POSITION UPDATE
============================ */

function updatePosition(enc,yawAngle){

let delta=(enc-lastEncoder)/ticksPerMeter;
let dist=delta*scale;

yaw=yawAngle;

posX+=dist*Math.cos(-yaw*Math.PI/180);
posY+=dist*Math.sin(-yaw*Math.PI/180);

pathHistory.push({x:posX,y:posY});

if(pathHistory.length>800)
pathHistory.shift();

lastEncoder=enc;

drawMap();

}

/* ============================
FETCH DATA
============================ */

async function updateData(){

try{

let res=await fetch("/data");
let d=await res.json();

/* MPU */

ax.innerText=d.ax.toFixed(2);
ay.innerText=d.ay.toFixed(2);
az.innerText=d.az.toFixed(2);

gx.innerText=d.gx.toFixed(2);
gy.innerText=d.gy.toFixed(2);
gz.innerText=d.gz.toFixed(2);

/* temp */

tempDisplay.innerText=d.temp.toFixed(1);

/* encoders */

leftTicks.innerText=d.left_ticks.toFixed(1);
rightTicks.innerText=d.right_ticks.toFixed(1);

/* tof */

tof1.innerText=d.tof1;
tof2.innerText=d.tof2;
tof3.innerText=d.tof3;

/* info */

yawAngle.innerText=d.yaw.toFixed(1)+"°";
gzDisplay.innerText=d.gz.toFixed(1);
enc1Display.innerText=d.enc_left.toFixed(0);

updatePosition(d.enc_left,d.yaw);

}catch(e){

console.log("data error",e);

}

}

/* ============================
INIT
============================ */

drawMap();

setInterval(updateData,100);

</script>

</body>
</html>
