<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Beetle Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0f0f23);
color:#e0e0e0;
height:100vh;
overflow:hidden;
}

/* ===== MAIN LAYOUT ===== */

.container{
display:grid;
grid-template-columns:30% 40% 30%;
height:100vh;
}

/* ================= TELEMETRY ================= */

.telemetry{
padding:20px;
border-right:1px solid rgba(0,255,136,.2);
display:flex;
flex-direction:column;
gap:18px;
}

.panel{
background:#141428;
border:1px solid rgba(0,255,200,.3);
border-radius:8px;
padding:12px;
}

.panel-title{
font-size:12px;
color:#00c8ff;
margin-bottom:6px;
text-transform:uppercase;
}

.row{
display:flex;
justify-content:space-between;
font-family:monospace;
}

/* temperature */

.temp{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #ff6464;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
align-self:flex-end;
}

/* ================= CAMERA ================= */

.camera{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.camera-title{
color:#fbbf24;
margin-bottom:10px;
}

.camera-feed{
width:100%;
height:420px;
border:2px solid rgba(255,200,0,.4);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

/* ================= RIGHT PANEL ================= */

.right-panel{
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

/* rover */

.rover-container{
position:relative;
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.rover-img{
width:120px;
}

.tof{
position:absolute;
width:70px;
height:45px;
background:#141428;
border:1px solid rgba(100,200,255,.4);
border-radius:6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:monospace;
color:#64c8ff;
}

.tof-top{top:0;left:50%;transform:translateX(-50%);}
.tof-left{left:0;top:50%;transform:translateY(-50%);}
.tof-right{right:0;top:50%;transform:translateY(-50%);}

/* map */

.map-circle{
width:320px;
height:320px;
border-radius:50%;
border:2px solid #00ff88;
background:#111827;
margin:auto;
position:relative;
}

canvas{
width:100%;
height:100%;
}

.map-info{
display:flex;
flex-direction:column;
gap:10px;
}

.info{
display:flex;
justify-content:space-between;
border:1px solid rgba(0,255,136,.3);
padding:8px;
border-radius:6px;
}

.reset-btn{
background:#ff3366;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<!-- TELEMETRY -->
<div class="telemetry">

<div class="temp">
<div id="tempDisplay">0°</div>
TEMP
</div>

<div class="panel">
<div class="panel-title">Linear Acceleration</div>
<div class="row"><span>AX</span><span id="ax">0</span></div>
<div class="row"><span>AY</span><span id="ay">0</span></div>
<div class="row"><span>AZ</span><span id="az">0</span></div>
</div>

<div class="panel">
<div class="panel-title">Gyroscope</div>
<div class="row"><span>GX</span><span id="gx">0</span></div>
<div class="row"><span>GY</span><span id="gy">0</span></div>
<div class="row"><span>GZ</span><span id="gz">0</span></div>
</div>

<div class="panel">
<div class="panel-title">Encoders</div>
<div class="row"><span>Left</span><span id="leftTicks">0</span></div>
<div class="row"><span>Right</span><span id="rightTicks">0</span></div>
</div>

</div>

<!-- CAMERA -->
<div class="camera">

<div class="camera-title">CAMERA FEED</div>

<div class="camera-feed">
<img id="cameraStream" style="max-width:100%;max-height:100%;">
<span id="cameraPlaceholder">NO FEED</span>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right-panel">

<!-- ROVER + TOF -->
<div class="rover-container">

<div class="tof tof-top">
FRONT
<div id="tof2">0</div>
</div>

<div class="tof tof-left">
LEFT
<div id="tof1">0</div>
</div>

<div class="tof tof-right">
RIGHT
<div id="tof3">0</div>
</div>

<img src="/static/rover.png" class="rover-img">

</div>

<!-- MAP -->
<div class="map-circle">
<canvas id="mapCanvas"></canvas>
</div>

<div class="map-info">

<div class="info">
<span>Yaw</span>
<span id="yawAngle">0</span>
</div>

<div class="info">
<span>Angular Vel</span>
<span id="gzDisplay">0</span>
</div>

<div class="info">
<span>Distance</span>
<span id="enc1Display">0</span>
</div>

<button class="reset-btn" onclick="resetPosition()">RESET MAPPING</button>

</div>

</div>

</div>

<script>
        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 240;

        // Position tracking
        let posX = centerX;
        let posY = centerY;
        let startX = centerX;
        let startY = centerY;
        let yaw = 0;
        let pathHistory = [];

        // Encoder tracking (uses enc1 for position calculation)
        let lastEncoder = 0;
        const ticksPerMeter = 1000; // Adjust based on your encoder
        const scale = 100; // Pixels per meter

        // ============================================
        // RESET FUNCTION
        // ============================================
        function resetPosition() {
            posX = centerX;
            posY = centerY;
            startX = centerX;
            startY = centerY;
            yaw = 0;
            pathHistory = [];
            lastEncoder = 0;

            // Also reset on server
            fetch('/reset', { method: 'POST' });

            drawMap();
            console.log('Position reset!');
        }

        // Keyboard shortcut: Press 'R' to reset
        document.addEventListener('keydown', function (e) {
            if (e.key === 'r' || e.key === 'R') {
                resetPosition();
            }
        });

        // ============================================
        // DRAW MAP
        // ============================================
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(centerX - radius, centerY);
            ctx.lineTo(centerX + radius, centerY);
            ctx.moveTo(centerX, centerY - radius);
            ctx.lineTo(centerX, centerY + radius);
            ctx.stroke();

            // Draw path history
            if (pathHistory.length > 1) {
                // Dark outline
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) {
                    ctx.lineTo(pathHistory[i].x, pathHistory[i].y);
                }
                ctx.stroke();

                // Red path
                ctx.strokeStyle = '#ff3366';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) {
                    ctx.lineTo(pathHistory[i].x, pathHistory[i].y);
                }
                ctx.stroke();

                // Waypoint dots
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < pathHistory.length; i += 30) {
                    ctx.beginPath();
                    ctx.arc(pathHistory[i].x, pathHistory[i].y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw start position (green)
            ctx.beginPath();
            ctx.arc(startX, startY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw current position (red)
            ctx.beginPath();
            ctx.arc(posX, posY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw direction indicator
            // Draw direction arrow
            ctx.save();
            ctx.translate(posX, posY);
            ctx.rotate(-yaw * Math.PI / 180);

            ctx.beginPath();
            ctx.moveTo(25, 0);      // Tip
            ctx.lineTo(5, 6);       // Head Right
            ctx.lineTo(5, 2);       // Shaft Right Start
            ctx.lineTo(-35, 2);     // Tail Right
            ctx.lineTo(-35, -2);    // Tail Left
            ctx.lineTo(5, -2);      // Shaft Left Start
            ctx.lineTo(5, -6);      // Head Left
            ctx.closePath();

            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 5;
            ctx.fill();
            ctx.restore();
        }

        // ============================================
        // UPDATE POSITION
        // ============================================
        function updatePosition(encoder, yawAngle) {
            // Calculate distance from encoder change
            const delta = (encoder - lastEncoder) / ticksPerMeter;
            const distance = delta * scale;

            // Use yaw angle for direction (yaw is integrated gz from server)
            yaw = yawAngle;

            // Update position (yaw: 0 = right, 90 = down, etc.)
            posX += distance * Math.cos(-yaw * Math.PI / 180);
            posY += distance * Math.sin(-yaw * Math.PI / 180);

            // Keep within circular bounds
            const distFromCenter = Math.sqrt((posX - centerX) ** 2 + (posY - centerY) ** 2);
            if (distFromCenter > radius - 15) {
                const angle = Math.atan2(posY - centerY, posX - centerX);
                posX = centerX + (radius - 15) * Math.cos(angle);
                posY = centerY + (radius - 15) * Math.sin(angle);
            }

            // Add to path history
            if (distance !== 0) {
                pathHistory.push({ x: posX, y: posY });
                if (pathHistory.length > 1000) pathHistory.shift();
            }

            lastEncoder = encoder;
            drawMap();
        }

        // ============================================
        // FETCH DATA
        // ============================================
        async function updateData() {
            try {
                const res = await fetch("/data");
                const d = await res.json();

                // Update MPU - Linear Acceleration
                document.getElementById('ax').innerText = parseFloat(d.ax).toFixed(2);
                document.getElementById('ay').innerText = parseFloat(d.ay).toFixed(2);
                document.getElementById('az').innerText = parseFloat(d.az).toFixed(2);

                // Update MPU - Angular Velocity
                document.getElementById('gx').innerText = parseFloat(d.gx).toFixed(2);
                document.getElementById('gy').innerText = parseFloat(d.gy).toFixed(2);
                document.getElementById('gz').innerText = parseFloat(d.gz).toFixed(2);

                // Update Temperature
                if (d.temp !== undefined) {
                    document.getElementById('tempDisplay').innerText = parseFloat(d.temp).toFixed(1);
                }

                // Update Encoders (averaged ticks)
                document.getElementById('leftTicks').innerText = parseFloat(d.left_ticks).toFixed(1);
                document.getElementById('rightTicks').innerText = parseFloat(d.right_ticks).toFixed(1);

                // Update 4 ToF Sensors
                document.getElementById('tof1').innerText = d.tof1;
                document.getElementById('tof2').innerText = d.tof2;
                document.getElementById('tof3').innerText = d.tof3;
                document.getElementById('tof4').innerText = d.tof4;

                // Update info display
                const yawVal = parseFloat(d.yaw) || 0;
                document.getElementById('yawAngle').innerText = yawVal.toFixed(1) + '°';
                document.getElementById('gzDisplay').innerText = parseFloat(d.gz).toFixed(1);
                document.getElementById('enc1Display').innerText = parseFloat(d.enc_left).toFixed(0);

                // Update position on map (uses accumulated enc_left for distance, yaw for direction)
                updatePosition(parseFloat(d.enc_left) || 0, yawVal);

            } catch (e) {
                console.log('Fetch error:', e);
            }
        }

        // Camera stream
        function updateCamera() {
            const img = document.getElementById('cameraStream');
            const placeholder = document.getElementById('cameraPlaceholder');
            img.src = '/stream?' + Date.now();
            img.onload = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
            img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'block'; };
        }

        // ============================================
        // INITIALIZE
        // ============================================
        drawMap();
        setInterval(updateData, 100);  // 10 Hz
        setInterval(updateCamera, 1000);
    </script>

</body>
</html>
