<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beetle Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ===== LEFT PANEL - MAP ===== */
        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(180deg, #0d0d1a 0%, #151528 100%);
            border-right: 1px solid rgba(0, 255, 136, 0.2);
            position: relative;
        }

        .map-container {
            position: relative;
            width: 700px;
            height: 700px;
        }

        .map-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #00ff88;
            background:
                radial-gradient(circle at center, #1f2937 0%, #111827 100%),
                linear-gradient(rgba(0, 255, 136, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .map-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .map-legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-dot.start {
            background: #00ff88;
        }

        .legend-dot.current {
            background: #ff3366;
        }

        .reset-btn {
            background: linear-gradient(145deg, #ff3366, #cc2952);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
        }

        .map-info {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 6px;
            padding: 8px 15px;
            text-align: center;
            min-width: 120px;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-label {
            font-size: 1rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.2rem;
            color: #00ff88;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
            overflow-y: auto;
        }

        /* MPU Section - Top */
        .mpu-section {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .mpu-card {
            flex: 1;
            background: linear-gradient(145deg, rgba(20, 20, 40, 0.9), rgba(10, 10, 25, 0.9));
            border: 1px solid rgba(100, 100, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
        }

        .mpu-card.linear {
            border-color: rgba(0, 200, 255, 0.4);
        }

        .mpu-card.gyro {
            border-color: rgba(255, 100, 200, 0.4);
        }

        .mpu-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mpu-card.linear .mpu-title {
            color: #00c8ff;
        }

        .mpu-card.gyro .mpu-title {
            color: #ff64c8;
        }

        .mpu-values {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mpu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mpu-label {
            font-size: 0.8rem;
            color: #ffffff;
            font-weight: 500;
        }

        .mpu-value {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .mpu-card.linear .mpu-value {
            color: #00c8ff;
        }

        .mpu-card.gyro .mpu-value {
            color: #ff64c8;
        }

        /* Camera Section */
        .camera-section {
            display: flex;
            flex-direction: column;
        }

        .camera-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
        }

        .camera-feed {
            background: linear-gradient(145deg, #0a0a15, #151525);
            border: 2px solid rgba(251, 191, 36, 0.4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        .camera-feed img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .camera-placeholder {
            color: #4b5563;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Bottom Section - Rover + Encoders */
        .bottom-section {
            display: flex;
            gap: 15px;
            flex: 1;
        }

        /* Encoder Panel */
        .encoder-panel {
            width: 140px;
            background: linear-gradient(145deg, rgba(20, 20, 40, 0.9), rgba(10, 10, 25, 0.9));
            border: 1px solid rgba(50, 200, 100, 0.4);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .encoder-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #32c864;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(50, 200, 100, 0.3);
        }

        .encoder-group {
            margin-bottom: 10px;
        }

        .encoder-group-title {
            font-size: 0.65rem;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .encoder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
        }

        .encoder-label {
            font-size: 0.7rem;
            color: #9ca3af;
        }

        .encoder-value {
            font-size: 0.85rem;
            color: #32c864;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        /* Rover ToF Section */
        .rover-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rover-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0px;
        }

        .rover-diagram {
            position: relative;
            width: 500px;
            height: 235px;
            margin-top: 10px;
            padding-top: 0;
        }

        .rover-body {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 210px;
            /* background: linear-gradient(145deg, #2d2d4a, #1a1a30);
            border: 2px solid #a78bfa; */
            /* border-radius: 10px; */
            background-image: url('/static/rover.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        .tof-sensor {
            position: absolute;
            width: 90px;
            height: 60px;
            background: linear-gradient(145deg, rgba(20, 20, 35, 0.9), rgba(10, 10, 20, 0.9));
            border: 1px solid rgba(100, 200, 255, 0.5);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tof-label {
            color: #6b7280;
            font-weight: 500;
            font-size: 0.55rem;
        }

        .tof-value {
            color: #64c8ff;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
        }

        /* ToF Positions - 4 sensors */


        .tof-3 {
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
        }

        .tof-4 {
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
        }

        /* Responsive */
        @media (max-width: 1000px) {
            body {
                overflow-y: auto;
                /* Allow scrolling on mobile */
            }

            .container {
                flex-direction: column;
                height: auto;
                overflow-y: visible;
            }

            .left-panel,
            .right-panel {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid rgba(0, 255, 136, 0.2);
                padding: 15px;
            }

            .map-container {
                width: 85vw;
                height: 85vw;
                max-width: 450px;
                max-height: 450px;
                margin: 10px 0;
            }

            .bottom-section {
                flex-direction: column;
            }

            .encoder-panel {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                gap: 10px;
            }

            .encoder-group {
                flex: 1;
                min-width: 120px;
                margin-bottom: 0;
            }
        }

        @media (max-width: 480px) {
            .mpu-section {
                flex-direction: column;
            }

            .rover-diagram {
                transform: scale(0.8);
                transform-origin: center top;
                margin-bottom: -50px;
                /* Compensate for empty space after scaling */
            }

            .map-info {
                gap: 8px;
            }

            .info-box {
                min-width: 60px;
                padding: 6px 10px;
            }

            .info-value {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- LEFT PANEL - MAP -->
        <div class="left-panel">
            <div class="map-container">
                <div class="map-circle">
                    <canvas id="mapCanvas" class="map-canvas" width="500" height="500"></canvas>
                </div>
            </div>

            <div class="map-legend">
                <div class="legend-item">
                    <div class="legend-dot start"></div>
                    <span>Start</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot current"></div>
                    <span>Current</span>
                </div>
                <div class="legend-item">
                    <div style="width: 15px; height: 3px; background: #ff3366; border-radius: 2px;"></div>
                    <span>Path</span>
                </div>
            </div>

            <div class="map-info">
                <div class="info-box">
                    <div class="info-label">Yaw</div>
                    <div class="info-value" id="yawAngle">0°</div>
                </div>
                <div class="info-box">
                    <div class="info-label">GZ</div>
                    <div class="info-value" id="gzDisplay">0</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Distance Travelled</div>
                    <div class="info-value" id="enc1Display">0</div>
                </div>
            </div>

            <button class="reset-btn" onclick="resetPosition()">RESET</button>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

            <!-- MPU Section -->
            <div class="mpu-section">
                <div class="mpu-card linear">
                    <div class="mpu-title">Linear Acceleration (m/s²)</div>
                    <div class="mpu-values">
                        <div class="mpu-row">
                            <span class="mpu-label">AX:</span>
                            <span class="mpu-value" id="ax">0.00</span>
                        </div>
                        <div class="mpu-row">
                            <span class="mpu-label">AY:</span>
                            <span class="mpu-value" id="ay">0.00</span>
                        </div>
                        <div class="mpu-row">
                            <span class="mpu-label">AZ:</span>
                            <span class="mpu-value" id="az">0.00</span>
                        </div>
                    </div>
                </div>

                <div class="mpu-card gyro">
                    <div class="mpu-title">Angular Velocity (°/s)</div>
                    <div class="mpu-values">
                        <div class="mpu-row">
                            <span class="mpu-label">GX:</span>
                            <span class="mpu-value" id="gx">0.00</span>
                        </div>
                        <div class="mpu-row">
                            <span class="mpu-label">GY:</span>
                            <span class="mpu-value" id="gy">0.00</span>
                        </div>
                        <div class="mpu-row">
                            <span class="mpu-label">GZ:</span>
                            <span class="mpu-value" id="gz">0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Camera Section -->
            <div class="camera-section">
                <div class="camera-title">Camera Feed</div>
                <div class="camera-feed">
                    <img id="cameraStream" src="" alt="Camera Feed" style="display: none;">
                    <span class="camera-placeholder" id="cameraPlaceholder">No Feed</span>
                </div>
            </div>

            <!-- Bottom Section: Encoders + Rover -->
            <div class="bottom-section">

                <!-- Encoder Panel -->
                <div class="encoder-panel">
                    <div class="encoder-title">Encoders (Δ ticks/interval)</div>

                    <div class="encoder-group">
                        <div class="encoder-group-title">Left (avg of 3)</div>
                        <div class="encoder-item">
                            <span class="encoder-label">L:</span>
                            <span class="encoder-value" id="leftTicks">0</span>
                        </div>
                    </div>

                    <div class="encoder-group">
                        <div class="encoder-group-title">Right (avg of 3)</div>
                        <div class="encoder-item">
                            <span class="encoder-label">R:</span>
                            <span class="encoder-value" id="rightTicks">0</span>
                        </div>
                    </div>
                </div>

                <!-- Rover ToF Section -->
                <div class="rover-section">
                    <div class="rover-title">ToF Sensors (mm)</div>
                    <div class="rover-diagram">
                        <div class="tof-sensor tof-1">
                            <span class="tof-label">TL</span>
                            <span class="tof-value" id="tof1">0</span>
                        </div>
                        <div class="tof-sensor tof-2">
                            <span class="tof-label">TR</span>
                            <span class="tof-value" id="tof2">0</span>
                        </div>
                        <div class="tof-sensor tof-3">
                            <span class="tof-label">L</span>
                            <span class="tof-value" id="tof3">0</span>
                        </div>
                        <div class="tof-sensor tof-4">
                            <span class="tof-label">R</span>
                            <span class="tof-value" id="tof4">0</span>
                        </div>

                        <div class="rover-body"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ============================================
        // CANVAS SETUP
        // ============================================
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 240;

        // Position tracking
        let posX = centerX;
        let posY = centerY;
        let startX = centerX;
        let startY = centerY;
        let yaw = 0;
        let pathHistory = [];

        // Encoder tracking (uses enc1 for position calculation)
        let lastEncoder = 0;
        const ticksPerMeter = 1000; // Adjust based on your encoder
        const scale = 100; // Pixels per meter

        // ============================================
        // RESET FUNCTION
        // ============================================
        function resetPosition() {
            posX = centerX;
            posY = centerY;
            startX = centerX;
            startY = centerY;
            yaw = 0;
            pathHistory = [];
            lastEncoder = 0;

            // Also reset on server
            fetch('/reset', { method: 'POST' });

            drawMap();
            console.log('Position reset!');
        }

        // Keyboard shortcut: Press 'R' to reset
        document.addEventListener('keydown', function (e) {
            if (e.key === 'r' || e.key === 'R') {
                resetPosition();
            }
        });

        // ============================================
        // DRAW MAP
        // ============================================
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(centerX - radius, centerY);
            ctx.lineTo(centerX + radius, centerY);
            ctx.moveTo(centerX, centerY - radius);
            ctx.lineTo(centerX, centerY + radius);
            ctx.stroke();

            // Draw path history
            if (pathHistory.length > 1) {
                // Dark outline
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) {
                    ctx.lineTo(pathHistory[i].x, pathHistory[i].y);
                }
                ctx.stroke();

                // Red path
                ctx.strokeStyle = '#ff3366';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(pathHistory[0].x, pathHistory[0].y);
                for (let i = 1; i < pathHistory.length; i++) {
                    ctx.lineTo(pathHistory[i].x, pathHistory[i].y);
                }
                ctx.stroke();

                // Waypoint dots
                ctx.fillStyle = '#ffffff';
                for (let i = 0; i < pathHistory.length; i += 30) {
                    ctx.beginPath();
                    ctx.arc(pathHistory[i].x, pathHistory[i].y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw start position (green)
            ctx.beginPath();
            ctx.arc(startX, startY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw current position (red)
            ctx.beginPath();
            ctx.arc(posX, posY, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw direction indicator
            // Draw direction arrow
            ctx.save();
            ctx.translate(posX, posY);
            ctx.rotate(-yaw * Math.PI / 180);

            ctx.beginPath();
            ctx.moveTo(25, 0);      // Tip
            ctx.lineTo(5, 6);       // Head Right
            ctx.lineTo(5, 2);       // Shaft Right Start
            ctx.lineTo(-35, 2);     // Tail Right
            ctx.lineTo(-35, -2);    // Tail Left
            ctx.lineTo(5, -2);      // Shaft Left Start
            ctx.lineTo(5, -6);      // Head Left
            ctx.closePath();

            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#000000';
            ctx.shadowBlur = 5;
            ctx.fill();
            ctx.restore();
        }

        // ============================================
        // UPDATE POSITION
        // ============================================
        function updatePosition(encoder, yawAngle) {
            // Calculate distance from encoder change
            const delta = (encoder - lastEncoder) / ticksPerMeter;
            const distance = delta * scale;

            // Use yaw angle for direction (yaw is integrated gz from server)
            yaw = yawAngle;

            // Update position (yaw: 0 = right, 90 = down, etc.)
            posX += distance * Math.cos(-yaw * Math.PI / 180);
            posY += distance * Math.sin(-yaw * Math.PI / 180);

            // Keep within circular bounds
            const distFromCenter = Math.sqrt((posX - centerX) ** 2 + (posY - centerY) ** 2);
            if (distFromCenter > radius - 15) {
                const angle = Math.atan2(posY - centerY, posX - centerX);
                posX = centerX + (radius - 15) * Math.cos(angle);
                posY = centerY + (radius - 15) * Math.sin(angle);
            }

            // Add to path history
            if (distance !== 0) {
                pathHistory.push({ x: posX, y: posY });
                if (pathHistory.length > 1000) pathHistory.shift();
            }

            lastEncoder = encoder;
            drawMap();
        }

        // ============================================
        // FETCH DATA
        // ============================================
        async function updateData() {
            try {
                const res = await fetch("/data");
                const d = await res.json();

                // Update MPU - Linear Acceleration
                document.getElementById('ax').innerText = parseFloat(d.ax).toFixed(2);
                document.getElementById('ay').innerText = parseFloat(d.ay).toFixed(2);
                document.getElementById('az').innerText = parseFloat(d.az).toFixed(2);

                // Update MPU - Angular Velocity
                document.getElementById('gx').innerText = parseFloat(d.gx).toFixed(2);
                document.getElementById('gy').innerText = parseFloat(d.gy).toFixed(2);
                document.getElementById('gz').innerText = parseFloat(d.gz).toFixed(2);

                // Update Encoders (averaged ticks)
                document.getElementById('leftTicks').innerText = parseFloat(d.left_ticks).toFixed(1);
                document.getElementById('rightTicks').innerText = parseFloat(d.right_ticks).toFixed(1);

                // Update 4 ToF Sensors
                document.getElementById('tof1').innerText = d.tof1;
                document.getElementById('tof2').innerText = d.tof2;
                document.getElementById('tof3').innerText = d.tof3;
                document.getElementById('tof4').innerText = d.tof4;

                // Update info display
                const yawVal = parseFloat(d.yaw) || 0;
                document.getElementById('yawAngle').innerText = yawVal.toFixed(1) + '°';
                document.getElementById('gzDisplay').innerText = parseFloat(d.gz).toFixed(1);
                document.getElementById('enc1Display').innerText = parseFloat(d.enc_left).toFixed(0);

                // Update position on map (uses accumulated enc_left for distance, yaw for direction)
                updatePosition(parseFloat(d.enc_left) || 0, yawVal);

            } catch (e) {
                console.log('Fetch error:', e);
            }
        }

        // Camera stream
        function updateCamera() {
            const img = document.getElementById('cameraStream');
            const placeholder = document.getElementById('cameraPlaceholder');
            img.src = '/stream?' + Date.now();
            img.onload = () => { img.style.display = 'block'; placeholder.style.display = 'none'; };
            img.onerror = () => { img.style.display = 'none'; placeholder.style.display = 'block'; };
        }

        // ============================================
        // INITIALIZE
        // ============================================
        drawMap();
        setInterval(updateData, 100);  // 10 Hz
        setInterval(updateCamera, 1000);
    </script>

</body>

</html>
